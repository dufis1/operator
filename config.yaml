# Operator config
# Secrets (API keys) stay in .env — this file is safe to commit and share.

agent:
  name: "Operator"
  trigger_phrase: "@operator"    # word that must appear in chat to trigger a response
  user_display_name: "Jojo Shapiro"  # your name as it appears on Google Meet pre-join screens
  conversation_timeout: 20       # seconds in listening mode after a response
  alone_exit_grace_seconds: 60   # after others have been present, if Operator is alone for this long, auto-leave
  # Appended to the first chat message from each new participant this session.
  # Supports {first_name} as a placeholder. Leave empty to disable greetings.
  first_contact_hint: "(First time talking to {first_name} — greet them by name once, then drop it.)"

llm:
  provider: "anthropic"            # openai | anthropic
  model: "claude-sonnet-4-5"         # openai: gpt-4.1-mini, gpt-4o, ...  |  anthropic: claude-sonnet-4-5, claude-opus-4-6, ...
  history_messages: 40         # max chat messages replayed from the meeting record as context
  max_tokens: 150              # max tokens per response; ~600 chars target for meeting chat side panel
  tool_result_max_chars: 50000 # incoming tool result truncation threshold — results over this are archived with a recovery hint
  tool_timeout_seconds: 60    # hard timeout for a single tool call; graceful failure sent to chat if exceeded
  tool_heartbeat_seconds: 8   # how often to send "still working..." while a tool call is in flight
  system_prompt: >
    You are Operator, an AI assistant participating in a meeting via chat.
    Meeting chat is a side panel — participants are glancing, not reading.
    Lead with the answer. No preamble, no filler, no narrating your process, no trailing offers or follow-up questions.
    Keep every response to 1–3 sentences.
    Render links as bare URLs, not markdown. No [label](url) syntax — just the URL.
    If a required parameter is ambiguous or unclear, ask the user to clarify rather than guessing. Do not invent values for owner, repo, team, or assignee that the user did not explicitly state.
    After any action that creates or modifies an external resource (issue, PR, document, etc.), include the link from the tool result so the user can verify.
    Use a person's name only when greeting them for the first time. Do not repeat their name in subsequent replies.
    Messages prefixed with [spoken] are live captions of what participants are saying out loud — ambient context, not messages addressed to you. Use them to understand what's being discussed, but only respond when someone types in chat (addressed via the trigger phrase, or in a 1-on-1).

connector:
  browser_profile_dir: "./browser_profile"
  auth_state_file: "./auth_state.json"  # path to auth_state.json for session recovery
  idle_timeout_seconds: 600      # how long to wait with no activity before giving up (lobby + in-meeting inactivity)

# Skills — Claude Code-style SKILL.md folders the LLM can load on demand.
# Each entry is a path to either:
#   - a single skill folder containing SKILL.md, OR
#   - a parent directory that will be scanned one level deep for */SKILL.md
# Paths support ~ expansion. Later entries override earlier ones on name collision (last-wins).
#
# progressive_disclosure: true  → LLM sees a name+description menu; calls load_skill(name) to pull full body.
#                         false → full bodies are injected into the system prompt at startup (no extra round-trip).
skills:
  progressive_disclosure: true
  paths: []
  # Examples:
  #   - ~/.claude/skills            # scan every skill folder under ~/.claude/skills/
  #   - ./skills/commit             # load a single skill folder

transcript:
  # Off by default — captions capture EVERY participant's speech for the whole
  # meeting into ~/.operator/history/<slug>.jsonl. Only enable when the room
  # has consented to a bot transcribing them.
  captions_enabled: false
  silence_seconds: 0.7           # gap with no caption updates that finalizes an utterance

# MCP tool servers — Operator connects to these at startup and offers their tools to the LLM.
# Each server runs as a subprocess (stdio transport). Env values like ${VAR} resolve from .env.
# Uncomment a server to enable it.
mcp_servers:
  linear:
    command: "npx"
    args: ["-y", "mcp-remote", "https://mcp.linear.app/mcp"]
    confirm_tools: []   # read tools auto-execute; list tool names here to always require confirmation
    hints: |
      Always set includeArchived=false unless the user explicitly asks for archived issues.
      When the user specifies a state, use state types (unstarted, started, backlog, completed, canceled) not display names — status names differ by team. "Todo" is Product team only; Engineering uses "Ready for dev". Do not add a state filter unless the user explicitly asks for one — omitting it returns all states.
      When setting a specific status (e.g. to cancel an issue), call list_issue_statuses first and use the exact name or ID. If two statuses share a type, use the status ID to avoid ambiguity. If list_issue_statuses returns empty, the name given is probably a project, not a team — ask the user to clarify.
      For issue detail, use get_issue not list_issues — list_issues truncates descriptions.
      If hasNextPage=true, the result is partial — tell the user and offer to fetch more.
      When creating an issue, confirm team, assignee, and priority if not stated by the user.
      create_document requires a project or issue — ask which project before calling. There is no delete_document tool; warn the user if a document is created in error.
  github:
    command: "./github-mcp-server"
    args: ["stdio"]
    confirm_tools: []   # read tools auto-execute; list tool names here to always require confirmation
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_TOKEN}"
    hints: |
      When reading a file on a non-default branch, always pass ref=<branch>. Without ref, the API silently returns the main branch copy or 404.
      search_code can return 0 results even when matching code exists (GitHub's search index has delays). Empty results don't mean the code is absent.
      When the user refers to "my repo" or "our repo", scope search_repositories with user:<login> (from get_me) or org:<org>. Unscoped queries return tens of thousands of unrelated results.
      Set minimal_output=true on search tools when full API objects are not needed.
      For directory navigation, a single-level listing is fine. Do not traverse recursively — directory entries are verbose.
      If a write tool returns HTTP 403 "Resource not accessible by personal access token", the PAT is missing permissions — tell the user rather than retrying.
      To explore a repo, use get_file_contents to list directories and read files. Start from the root or the path the user mentions. Never guess file paths.
      For multi-step tasks (e.g. list directory then read a file), chain tool calls without pausing to narrate intermediate steps.
      When summarizing: filename + 1-2 sentences on actual content. No search narration. Never describe a file's likely contents — read it first.

