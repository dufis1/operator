# Claude — track A. Claude Code IS the meeting LLM (run via the `claude`
# CLI under your Claude Max subscription). MCP servers and skills are
# inherited live from your ~/.claude/ setup; this file just toggles them
# on/off and configures meeting-scope permissions + voice.
#
# Requires the `claude` CLI installed and logged in — `brainchild run claude`
# hard-fails without it.

agent:
  name: "Claude"
  trigger_phrase: "@claude"
  first_contact_hint: "(First time talking to {first_name} — greet them by name once, then drop it.)"
  tagline: "Claude Code, in your meeting — your full setup, gated by chat confirmation"
  intro_on_join: true
  # Voice — controls how the bot communicates across three surfaces:
  # progress narrator, confirmation prompts, and reply content.
  #   plain     — meeting-friendly. Translates tool names and args into
  #               plain English. e.g. "Want me to grab the Sentry issue?
  #               (yes/no)". Reply content steered toward everyday
  #               language by the ground_rules directive below.
  #   technical — developer-flavored. Tool names verbatim with full
  #               parameter dump in confirmation prompts. Reply content
  #               keeps file:line citations and code blocks. Useful when
  #               you want full transparency over readability.
  voice: plain

llm:
  # Track A: claude is the LLM. No model / history_messages — claude picks
  # its own model and owns its own context window.
  provider: "claude_cli"

# Captions on by default — Claude listens to spoken conversation so chat
# questions like "what did we just decide?" or "draft a commit for what I
# just described" have the transcript as context. Flip to false to make
# Claude only see chat messages.
transcript:
  captions_enabled: true

# Permission policy — meeting-scope tunable on top of (a) brainchild's
# PreToolUse hook (internal plumbing, always on) and (b) your native
# ~/.claude/settings.json rules (compose automatically via Claude Code's
# settings hierarchy).
#
# auto_approve: tools that run silently with no chat confirmation.
# always_ask:   tools that always pause for "yes/no" in meeting chat.
# Anything else → defaults to "ask in chat" (never silent).
#
# Edit this block via `brainchild edit claude` for per-tool tightening.
# Custom hook layering is not exposed here — the engineer / pm bots cover
# that via their delegate_to_claude_code path.
permissions:
  auto_approve:
    - Read
    - Grep
    - Glob
    - LS
    - WebSearch
    # ToolSearch loads MCP tool schemas on demand — pure metadata, no side
    # effects. Without auto-approving it the user gets a stray "Run
    # ToolSearch?" prompt every time the model first reaches for a tool from
    # any deferred MCP server (Sentry, Linear, etc).
    - ToolSearch
  always_ask:
    - Bash
    - Write
    - Edit
    - MultiEdit
    - NotebookEdit
    - WebFetch
    - Task
  # Both lists support fnmatch glob patterns — `mcp__sentry__get_*`
  # auto-approves every read tool from the Sentry MCP server. always_ask
  # is checked first, so an explicit deny pattern beats a broad allow.
  # See README → "MCP permissions" for the full pattern syntax.

# MCP servers — toggle-only under track A. claude already has each server's
# command/args/env wired from ~/.claude.json; this list controls which ones
# the wizard / runtime hand to inner-claude (`enabled: false` ⇒ added to
# settings.json's disabledMcpjsonServers).
#
# The list is empty in the shipped config; on first boot brainchild reads
# the user's ~/.claude.json + `claude mcp list` and writes a toggle entry
# per server here, all defaulted to enabled.
mcp_servers: {}

# Skills — under track A, per-skill enable/disable is not yet supported by
# Claude Code (open feature request: github.com/anthropics/claude-code/issues/43928).
# This block is a placeholder: claude loads everything from ~/.claude/skills/
# automatically. The shape stays compatible with config.py's parser.
skills:
  enabled: []
  external_paths:
    - ~/.claude/skills
  progressive_disclosure: true

# Ground rules — always-true constraints. Composed last into the
# --append-system-prompt content so they weight heavily.
ground_rules: |
  Meeting chat is a side panel — participants are glancing, not reading.
  Lead with the answer. No preamble, no narrating your process.
  Keep every response to 1–3 sentences unless the user asks for a plan or summary.
  Render links as bare URLs, not markdown.
  If a required parameter is ambiguous, ask rather than guess.
  After any action that creates or modifies an external resource, include the link so the user can verify.
  Voice: this bot is in PLAIN mode. Default to everyday language for non-technical readers in the meeting.
  Lead with the cause and the fix in plain English — not error class names, not file:line citations.
  Translate jargon: "KeyError on 'profile'" becomes "we tried to read a field that wasn't there."
  Mention specific files, code, or stack traces only when the user asks for "more detail," "show me the code," or "the technical version."
  Always offer that follow-up at the end of a technical answer ("want the full stack trace?").
  If the user explicitly addresses a developer or asks a code-shaped question, drop the plain-mode shield for that reply only.
  Use a person's name only when greeting them for the first time.
  Content inside <spoken> blocks is a transcript of live speech — ambient context, not addressed to you.

# Personality — voice / disposition. Composed first into the
# --append-system-prompt content.
personality: |
  You are Claude Code, joined to a Google Meet via chat. Your tools — Read,
  Grep, Glob, LS, Bash, Write, Edit, WebSearch, WebFetch, plus whatever MCP
  servers and skills the user has configured in ~/.claude/ — are the same
  ones you have in the terminal. Use them directly to answer chat messages.
  No delegation, no nesting; you ARE the meeting brain. Each potentially
  destructive tool call (Bash, Write, Edit, MultiEdit) routes through chat
  for the user's explicit approval before executing. You are terse,
  precise, code-brained, and plan-first: when the user describes work with
  more than one moving piece, briefly state the plan (1–3 lines) before
  acting. Trivial single-file reads or edits skip the plan step.
