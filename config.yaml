# Operator loadout config
# Secrets (API keys) stay in .env — this file is safe to commit and share.

agent:
  name: "Operator"
  wake_phrase: "hey operator"
  system_prompt: >
    You are Operator, an AI thought partner participating in a meeting.
    Your responses will be spoken aloud via text-to-speech, so:
    keep responses to 1-2 SHORT sentences, under 30 words total.
    Never use markdown, bullet points, or formatting.
    Speak in plain, natural sentences only.
    Be direct — no preamble, no filler, no caveats.
    User input comes from speech-to-text and may contain transcription
    errors (e.g. "shop advice" instead of "Shopify's"). Use surrounding
    context to infer the intended words.
  chat_wake_phrase: "/operator"    # word that must appear in chat to trigger a response
  interaction_mode: "voice"      # voice | chat | both
  conversation_timeout: 20       # seconds in listening mode after a response
  echo_guard_seconds: 0.6        # delay after TTS before resuming caption capture (absorbs echo)

llm:
  provider: "openai"
  model: "gpt-4.1-mini"
  chat_history_turns: 4        # max user/assistant pairs kept in chat context
  chat_max_tokens: 300         # max tokens for chat responses (voice uses 60)
  chat_system_prompt: >
    You are Operator, an AI assistant participating in a meeting via chat.
    Keep responses concise — short paragraphs, not walls of text.
    You may use brief markdown formatting when it helps readability.
    Be direct. No preamble, no filler.
    When you have access to tools, describe what you can do if asked.
    If you decide to use a tool, explain what you're about to do.

tts:
  provider: "local"             # local | openai | elevenlabs
  # local provider settings
  local_voice: "kokoro_heart"   # kokoro_heart | kokoro_sky | kokoro_isabella | kokoro_emma | macos_say | piper_lessac | piper_amy
  # openai provider settings
  openai_model: "gpt-4o-mini-tts"
  openai_voice: "nova"
  # elevenlabs provider settings
  voice_id: "JBFqnCBsd6RMkjVDRZzb"
  model: "eleven_flash_v2_5"

stt:
  provider: "mlx"               # mlx | faster-whisper
  model: "base"                  # model size: tiny | base | small | medium
  device: "cpu"                  # faster-whisper only
  compute_type: "int8"           # faster-whisper only

connector:
  type: "auto"                   # auto | audio | linux | docker | meet-captions
  browser_profile_dir: "./browser_profile"
  auth_state_file: "./auth_state.json"  # path to auth_state.json for session recovery
  idle_timeout_seconds: 600      # how long to wait with no activity before giving up (lobby + in-meeting inactivity)

captions:
  silence_seconds: 0.7           # seconds of no DOM updates before text is considered final

diagnostics:
  latency_probe: true            # set false to disable mic monitoring (suppresses PortAudio input monitoring feedback)
  debug_audio: false             # set true to save TTS WAV + BlackHole recording to debug/ for dropout diagnosis

# MCP tool servers — Operator connects to these at startup and offers their tools to the LLM.
# Each server runs as a subprocess (stdio transport). Env values like ${VAR} resolve from .env.
# Uncomment a server to enable it.
mcp_servers: {}
